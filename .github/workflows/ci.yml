name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://triageflow:triageflow@localhost:5432/triageflow?serverVersion=16&charset=utf8

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: triageflow
          POSTGRES_USER: triageflow
          POSTGRES_PASSWORD: triageflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U triageflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, intl, zip, mbstring, xml
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup test database
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run tests
        run: php bin/phpunit --configuration phpunit.dist.xml

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, intl, zip
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan analysis
        run: php vendor/bin/phpstan analyse --level=5 --no-progress

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
