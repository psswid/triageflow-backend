name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://triageflow:triageflow@localhost:5432/triageflow?serverVersion=16&charset=utf8

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: triageflow
          POSTGRES_USER: triageflow
          POSTGRES_PASSWORD: triageflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U triageflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, intl, zip, mbstring, xml
          tools: composer:v2
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-

      - name: Install dependencies (skip auto-scripts — no server needed)
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Create .env for Symfony console
        run: |
          cp .env.test .env
          echo 'DEFAULT_URI=http://localhost:5173' >> .env
          echo "CORS_ALLOW_ORIGIN='^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$'" >> .env
          echo 'MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=1' >> .env
          echo 'MAILER_DSN=smtp://localhost:1025' >> .env
          echo 'JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem' >> .env
          echo 'JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem' >> .env
          echo 'JWT_PASSPHRASE=' >> .env

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem
          openssl pkey -in config/jwt/private.pem -pubout -out config/jwt/public.pem

      - name: Setup test database
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run tests with coverage
        run: php bin/phpunit --configuration phpunit.dist.xml --coverage-clover

      - name: Check coverage threshold (≥80%)
        run: |
          php -r '
            $file = "var/coverage/clover.xml";
            if (!file_exists($file)) {
              fwrite(STDERR, "ERROR: $file not found — coverage run may have failed\n");
              exit(1);
            }
            $xml = simplexml_load_file($file);
            $metrics = $xml->project->metrics;
            $covered = (int)$metrics["coveredstatements"];
            $total = (int)$metrics["statements"];
            $pct = $total > 0 ? round($covered / $total * 100, 2) : 0;
            echo "Coverage: {$pct}%\n";
            exit($pct >= 80 ? 0 : 1);
          '

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: var/coverage/clover.xml

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, intl, zip
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-

      - name: Install dependencies (skip auto-scripts — no server needed)
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Create .env for Symfony console
        run: |
          cp .env.test .env
          echo 'DEFAULT_URI=http://localhost:5173' >> .env
          echo "CORS_ALLOW_ORIGIN='^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$'" >> .env
          echo 'MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=1' >> .env
          echo 'MAILER_DSN=smtp://localhost:1025' >> .env
          echo 'JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem' >> .env
          echo 'JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem' >> .env
          echo 'JWT_PASSPHRASE=' >> .env

      - name: PHPStan analysis
        run: php vendor/bin/phpstan analyse --level=5 --no-progress

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
