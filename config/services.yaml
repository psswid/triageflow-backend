# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    ai.openrouter.base_url: 'https://openrouter.ai/api/v1'
    ai.openrouter.api_key: '%env(OPENROUTER_API_KEY)%'
    ai.openrouter.default_model: 'openrouter/free'
    ai.openrouter.fallback_model: 'openai/gpt-oss-120b:free'
    ai.openrouter.timeout: 60
    ai.openrouter.max_tokens: 1000
    ai.openrouter.temperature: 0.7

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\User\Domain\Repository\UserRepository:
        alias: App\User\Infrastructure\Repository\DoctrineUserRepository

    App\Triage\Domain\Repository\TriageSubmissionRepository:
        alias: App\Triage\Infrastructure\Repository\DoctrineTriageSubmissionRepository

    App\Shared\Infrastructure\Ai\OpenRouterClient:
        arguments:
            $baseUrl: '%ai.openrouter.base_url%'
            $defaultModel: '%ai.openrouter.default_model%'
            $fallbackModel: '%ai.openrouter.fallback_model%'
            $apiKey: '%ai.openrouter.api_key%'
            $timeout: '%ai.openrouter.timeout%'
            $maxTokens: '%ai.openrouter.max_tokens%'
            $temperature: '%ai.openrouter.temperature%'

    App\Shared\Infrastructure\Logging\CorrelationIdProcessor:
        tags:
            - { name: monolog.processor }

    App\User\Infrastructure\Controller\RegistrationController:
        arguments:
            $defaultUri: '%env(DEFAULT_URI)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

when@test:
    services:
        App\Tests\Triage\Infrastructure\Controller\TestTriageAnalyzer: ~

        App\Triage\Application\Service\TriageAnalyzerInterface:
            alias: App\Tests\Triage\Infrastructure\Controller\TestTriageAnalyzer
