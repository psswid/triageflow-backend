framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 2000
                    multiplier: 2
            scheduler_default:
                dsn: 'doctrine://default?queue_name=scheduler_default'
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            App\Triage\Application\Message\ProcessTriageMessage: async
            App\Synthetic\Application\Message\ProcessSyntheticTurnMessage: async
            App\Synthetic\Application\Message\ProcessSyntheticCaseMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
