services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: triageflow_php
    volumes:
      - .:/var/www
      - ./var:/var/www/var
      - /var/www/vendor
    environment:
      DATABASE_URL: "postgresql://triageflow:triageflow@db:5432/triageflow?serverVersion=16&charset=utf8"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - triageflow

  nginx:
    image: nginx:alpine
    container_name: triageflow_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - triageflow

  db:
    image: postgres:16-alpine
    container_name: triageflow_db
    environment:
      POSTGRES_DB: triageflow
      POSTGRES_USER: triageflow
      POSTGRES_PASSWORD: triageflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triageflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - triageflow

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: triageflow_worker
    command: php bin/console messenger:consume async -vv --limit=10
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./var:/var/www/var
      - /var/www/vendor
    environment:
      DATABASE_URL: "postgresql://triageflow:triageflow@db:5432/triageflow?serverVersion=16&charset=utf8"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - triageflow

  mailpit:
    image: axllent/mailpit:latest
    container_name: triageflow_mailpit
    ports:
      - "1025:1025"   # SMTP port
      - "8025:8025"   # Web UI port
    networks:
      - triageflow

volumes:
  pgdata:

networks:
  triageflow:
    name: triageflow_network
